<title>Masters 2026 Pool</title>
<style>

    --text: #1a1a1a;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  }
  /* --- Login --- */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--green-dark) 0%, #004d35 100%);
  }
  .login-box {
    background: var(--white); border-radius: 12px; padding: 48px 40px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.3); max-width: 380px; width: 90%;
  }
  .login-box h1 { color: var(--green-dark); font-size: 24px; margin-bottom: 6px; }
  .login-box .subtitle { color: var(--gold); font-size: 14px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
  .login-box input[type="password"] {
    width: 100%; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px;
    font-size: 16px; outline: none; transition: border-color .2s;
  }
  .login-box input[type="password"]:focus { border-color: var(--green-mid); }
  .login-box button {
    width: 100%; margin-top: 16px; padding: 12px; border: none; border-radius: 8px;
    background: var(--green-dark); color: var(--white); font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .login-box button:hover { background: var(--green-mid); }
  .login-error { color: #c0392b; font-size: 13px; margin-top: 10px; display: none; }

  /* --- Main --- */
  #app { display: none; }
  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, #004d35 100%);
    color: var(--white); padding: 20px 24px; text-align: center;
  }
  header h1 { font-size: 28px; margin-bottom: 2px; }
  header .event-name { color: var(--gold); font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
  .status-bar {
    background: #004d35; color: rgba(255,255,255,.8); padding: 8px 24px;
    font-size: 12px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px;
  }
  .status-bar .live-dot { display: inline-block; width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }
  .section-title {
    font-size: 18px; font-weight: 700; color: var(--green-dark); margin: 24px 0 12px;
    padding-bottom: 8px; border-bottom: 3px solid var(--gold);
  }
  .section-title:first-child { margin-top: 0; }

  .table-wrap { overflow-x: auto; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; background: var(--white); font-size: 13px; }
  th {
    background: var(--green-dark); color: var(--white); padding: 10px 12px;
    text-align: left; font-weight: 600; position: sticky; top: 0; white-space: nowrap;
  }
  td { padding: 8px 12px; border-bottom: 1px solid #eee; white-space: nowrap; }
  tr:hover td { background: var(--green-light); }

  .rank-col { font-weight: 700; color: var(--green-dark); text-align: center; width: 40px; }
  .money-col { font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }
  .pick-pos { display: inline-block; min-width: 28px; text-align: center; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 4px; }
  .pick-pos.top5 { background: var(--gold-light); color: #8a6d0b; }
  .pick-pos.top10 { background: #d5f5e3; color: #1a7a3a; }
  .pick-pos.top20 { background: #eef; color: #336; }
  .pick-pos.missed { background: #fde; color: #900; }
  .pick-pos.notstarted { background: #eee; color: #666; }
  .pick-detail { display: flex; flex-direction: column; gap: 1px; }
  .pick-detail .pick-top { display: flex; align-items: center; gap: 4px; }
  .pick-detail .pick-stats { font-size: 11px; color: var(--gray); font-variant-numeric: tabular-nums; }

  .score-col { font-weight: 700; text-align: center; }
  .under-par { color: #c0392b; }
  .over-par { color: #1a1a1a; }
  .even-par { color: var(--green-dark); }
  .thru-col, .round-col { text-align: center; color: var(--gray); }
  .pos-col { text-align: center; font-weight: 600; }
  .cut-line td { border-bottom: 3px dashed #e74c3c; }

  .pick-cell { font-size: 12px; }
  .pick-cell .golfer-name { font-weight: 500; }

  /* Highlight the pool member's row */
  tr.highlight td { background: var(--gold-light) !important; }
  tr.top3 td:first-child { position: relative; }
  tr.top3 td:first-child::before {

const PW_HASH = "1c3191193e1b5347daed7cce1e8cd20c666450647e4f9d0e5bc44578a7ba7f4f";

async function sha256(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

document.getElementById("login-form").addEventListener("submit", async function(e) {
  e.preventDefault();
  const pw = document.getElementById("pw").value;
  if (await sha256(pw) === PW_HASH) {
    sessionStorage.setItem("masters_auth", "1");
    showApp();
  } else {
    document.getElementById("login-error").style.display = "block";
  }
});

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  refresh();
  setInterval(refresh, 60000);

function getPayout(place) {

// ============================================================
// Name normalization for matching ESPN -> spreadsheet
// ============================================================
function norm(name) {
  return name.normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().toLowerCase();
}

// Manual aliases for ESPN name mismatches
const NAME_ALIASES = {
  "haotong li": "hao-tong li",
  "nico echavarria": "nicolas echavarria",
  "alex noren": "alexander noren",
  "johnny keefer": "john keefer",
  "matt mccarty": "matthew mccarty",
  "sami valimaki": "sami valimaki",
  "sergio garcia": "sergio garcia",
  "jose maria olazabal": "jose maria olazabal",
  "angel cabrera": "angel cabrera"
};

function matchName(espnName) {
  let n = norm(espnName);
  // Strip amateur suffix
  n = n.replace(/\s*\(a\)\s*$/, "");
  if (NAME_ALIASES[n]) n = NAME_ALIASES[n];
  return n;
}

function getMultiplier(espnName) {
  const n = matchName(espnName);
  for (const [k,v] of Object.entries(MULTIPLIERS)) {
    if (norm(k) === n) return v;
  }
  return 1.0;
}

// ============================================================
// Fetch and compute
// ============================================================
const ESPN_API = "https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard";

async function fetchLeaderboard() {
  const resp = await fetch(ESPN_API);
  const data = await resp.json();
  const event = data.events[0];
  const competitors = event.competitions[0].competitors;

  // First pass: parse round data for each competitor
  const parsed = competitors.map(c => {
    const name = c.athlete.displayName;
    const score = c.score || "--";
    const rounds = c.linescores || [];
    let rDisplays = ["--","--","--","--"];
    let today = "--", thru = "--", tot = "--";
    let hasHoles = false, totalStrokes = 0;

    for (const rd of rounds) {
      const period = rd.period || 0;
      const holes = rd.linescores || [];
      const rdDisp = rd.displayValue || "--";

      if (period >= 1 && period <= 4 && rd.value != null && rdDisp !== "-") {
        rDisplays[period-1] = rdDisp;
      }
      if (holes.length > 0) {
        hasHoles = true;
        totalStrokes += holes.reduce((s,h) => s + h.value, 0);
        today = rdDisp;
        thru = holes.length >= 18 ? "F" : String(holes.length);
      }
    }
    return { name, score, today, thru, r1:rDisplays[0], r2:rDisplays[1], r3:rDisplays[2], r4:rDisplays[3], tot: hasHoles ? String(totalStrokes) : "--", order: c.order, hasHoles };
  });

  // Detect ties by score among players who have started
  const scoreGroups = {};
  for (const p of parsed) {
    if (!p.hasHoles) continue;
    if (!scoreGroups[p.score]) scoreGroups[p.score] = [];
    scoreGroups[p.score].push(p);
  }

  // Assign positions: sort groups by best order, then assign sequential positions
  const sortedGroups = Object.values(scoreGroups).sort((a,b) => a[0].order - b[0].order);
  const posMap = new Map(); // order -> pos string
  let nextPos = 1;
  for (const group of sortedGroups) {
    const tied = group.length > 1;
    const posStr = tied ? "T" + nextPos : String(nextPos);
    for (const p of group) posMap.set(p.order, posStr);
    nextPos += group.length;
  }

  const rows = parsed.map(p => ({
    ...p,
    pos: p.hasHoles ? (posMap.get(p.order) || String(p.order)) : "-"
  }));

  return { rows, eventName: event.name };
}

function computeStandings(leaderboard) {
  // Group by position to calculate tie-split payouts
  const posGroups = {};
  const golferPos = {};

  for (const r of leaderboard) {
    const n = matchName(r.name);
    golferPos[n] = r.pos;
    if (r.pos === "-" || r.pos === "--") continue;
    const num = parseInt(r.pos.replace("T",""));
    if (isNaN(num)) continue;
    if (!posGroups[num]) posGroups[num] = [];
    posGroups[num].push(n);
  }

  const golferPayouts = {};
  for (const [posStr, golfers] of Object.entries(posGroups)) {
    const pos = parseInt(posStr);
    const n = golfers.length;
    let total = 0;
    for (let i = 0; i < n; i++) total += getPayout(pos + i);
    const perGolfer = total / n;
    golfers.forEach(g => { golferPayouts[g] = perGolfer; });
  }

  const standings = ENTRIES.map(entry => {
    let totalMoney = 0;
    const picksDetail = entry.picks.map(golfer => {
      const gn = norm(golfer);
      // Find matching ESPN name
      let espnMatch = null;
      for (const [k,v] of Object.entries(golferPos)) {
        if (k === gn || k === (NAME_ALIASES[gn] || gn)) { espnMatch = v; break; }
      }
      // Try alias reverse
      if (!espnMatch) {
        for (const [k,v] of Object.entries(golferPos)) {
          if (k === matchName(golfer)) { espnMatch = v; break; }
        }
      }
      const pos = espnMatch || "-";
      const mult = getMultiplier(golfer);
      const payout = golferPayouts[matchName(golfer)] || MIN_PAYOUT;
      const adj = payout * mult;
      totalMoney += adj;
      return { golfer, pos, mult, payout, adj };
    });
    return { name: entry.name, picks: picksDetail, totalMoney };
  });

  standings.sort((a,b) => b.totalMoney - a.totalMoney);
  return standings;
}

// ============================================================
// Render
// ============================================================
function scoreClass(s) {
  if (!s || s === "--" || s === "-") return "";
  if (s === "E") return "even-par";
  if (s.startsWith("-")) return "under-par";
  if (s.startsWith("+")) return "over-par";
  return "";
}

function posClass(pos) {
  if (pos === "-" || pos === "--") return "notstarted";
  const n = parseInt(pos.replace("T",""));
  if (isNaN(n)) return "notstarted";
  if (n <= 5) return "top5";
  if (n <= 10) return "top10";
  if (n <= 20) return "top20";
  return "missed";
}

    <th style="text-align:center">TODAY</th><th style="text-align:center">THRU</th>
    <th style="text-align:center">R1</th><th style="text-align:center">R2</th>
    <th style="text-align:center">R3</th><th style="text-align:center">R4</th>
    <th style="text-align:center">TOT</th>
  </tr></thead><tbody>`;
  for (const r of rows) {
    html += `<tr>
      <td class="pos-col">${r.pos}</td>
      <td>${r.name}</td>
      <td class="score-col ${scoreClass(r.score)}">${r.score}</td>
      <td class="score-col ${scoreClass(r.today)}">${r.today}</td>
      <td class="thru-col">${r.thru}</td>
      <td class="round-col">${r.r1}</td><td class="round-col">${r.r2}</td>
      <td class="round-col">${r.r3}</td><td class="round-col">${r.r4}</td>
      <td class="thru-col">${r.tot}</td>
    </tr>`;
  }
  html += "</tbody>";
  table.innerHTML = html;
}

function renderStandings(standings) {
  const table = document.getElementById("standings-table");
  let html = `<thead><tr>
    <th style="text-align:center;width:40px">#</th><th>PLAYER</th>
    <th>PICK 1</th><th>PICK 2</th><th>PICK 3</th>
    <th style="text-align:right">TOTAL</th>
  </tr></thead><tbody>`;
  standings.forEach((e, i) => {
    const rank = i + 1;
    const placeClass = rank <= 3 ? ` top3 place-${rank}` : "";
    const pickCells = e.picks.map(p => {
      const pc = posClass(p.pos);
      const money = "$" + p.adj.toLocaleString("en-US",{maximumFractionDigits:0});
      return `<td class="pick-cell"><div class="pick-detail">
        <div class="pick-top"><span class="golfer-name">${p.golfer}</span> <span class="pick-pos ${pc}">${p.pos}</span></div>
        <div class="pick-stats">${p.mult.toFixed(1)}x &middot; ${money}</div>
      </div></td>`;
    }).join("");
    html += `<tr class="${placeClass}">
      <td class="rank-col">${rank}</td>
      <td style="font-weight:600">${e.name}</td>
      ${pickCells}
      <td class="money-col">$${e.totalMoney.toLocaleString("en-US",{maximumFractionDigits:0})}</td>
    </tr>`;
  });
  html += "</tbody>";
  table.innerHTML = html;
}

async function refresh() {
  try {
    const { rows, eventName } = await fetchLeaderboard();
    document.getElementById("event-name").textContent = eventName;
    const standings = computeStandings(rows);
    renderStandings(standings);
    renderLeaderboard(rows);
    document.getElementById("last-updated").textContent =
      "Updated: " + new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit",timeZoneName:"short"});
  } catch (err) {
    console.error("Refresh failed:", err);
    document.getElementById("last-updated").textContent = "Update failed - retrying...";
  }
}

if (sessionStorage.getItem("masters_auth") === "1") showApp();
</script>
